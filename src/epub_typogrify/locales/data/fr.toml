# French.
inherits = "default"

[quotes]
double = { open = "«", close = "»" }   # guillemets for `"`
single = { open = "“", close = "”" }   # nested marks for `'`
apostrophe = "’"
punctuation = "logical"                # no typesetters' relocation

[dashes]
double_hyphen = "—"   # em dash for dialogue
# interrupted_dialogue is deliberately left unset: French marks an interruption
# with an ellipsis, not a dash [IN] — out of scope for the dash rule.

[spaces]
before_high_punctuation = true   # narrow nbsp before ; : ! ?
guillemet_inner = true           # narrow nbsp inside « »

[abbreviations]
nonbreaking = ["M.", "MM.", "Mme", "Mlle", "Dr", "No", "p.", "vol."]
