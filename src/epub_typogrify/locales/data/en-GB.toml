# British English — a small delta over `en` (same quote marks; see §2.7).
inherits = "en"

[quotes]
punctuation = "logical" # period/comma stays outside the closing quote
outer = "single"        # top-level quotation uses single marks (for --normalize-quotes)

[dashes]
double_hyphen = "–" # `--` -> en dash
parenthetical_spacing = "spaced"
# interrupted_dialogue is NOT overridden here: it stays the closed em dash
# inherited from `en` — British and American style agree on this one, even
# though they differ on the ordinary parenthetical dash above [NHR ch.4].

[abbreviations]
# British style drops the full stop after contractions ending in the last letter.
full_stop_after_contractions = false
nonbreaking = ["Mr", "Mrs", "Ms", "Dr", "St", "No.", "vol.", "p."]
